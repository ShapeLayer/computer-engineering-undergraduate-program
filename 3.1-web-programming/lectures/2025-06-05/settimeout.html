<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    let timerID = null;
    const startTimer = (time) => {
      timerID = setTimeout(() => {
        load('https://www.google.com');
      }, time);
      document.getElementById('img').title = '타이머 작동 시작'
    }
    const cancelTimer = () => {
      if (timerID !== null) {
        clearTimeout(timerID);
        timerID = null;
        document.getElementById('img').title = '타이머 작동 취소'
      }
    }
    const load = (url) => {
      window.location.href = url
    }
  </script>
</head>
<body>
  <h3>이미지에 마우스를 올리고 5초간 그대로 있을 때 사이트로 이동</h3>
  <hr>
  <div id="img" alt=""
    style="width: 300px; height: 200px; background-color: lightblue; text-align: center; line-height: 200px; font-size: 24px; cursor: pointer;"
    onmouseover="startTimer(5000)",
    onmouseout="cancelTimer()">
  >
</body>
</html>
