<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    const checkFilled = (element) => {
      if (element.value === '') {
        element.focus()
      }
    }
  </script>
</head>
<body onload="document.getElementById('name').focus()">
  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" onblur="checkFilled(this)">
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" onblur="checkFilled(this)">
    <br>
    <input type="submit" value="Submit">
  </form>
</body>
</html>
