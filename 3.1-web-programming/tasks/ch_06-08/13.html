<!DOCTYPE html>
<html>
<head>
  <title>라면을 끓이는 순서</title>
</head>
<body>
  <h2>라면 끓이는 법</h2>
  <h3>라면은 스프를 먼저 넣는 겁니다.</h3>
  <hr>
  <ol type="A">
    <li>물을 끓인다.</li>
    <li>라면과 스프를 넣는다.</li>
    <li>파를 썰어 넣는다.</li>
    <li>5분 후 <strong>맛있게</strong> 먹는다.</li>
  </ol>
  <script>
    document.querySelector('h2').style.color = 'blue';
    document.querySelector('h3').style.color = 'red';
    document.querySelector('ol[type="A"]').style.color = 'green';
  </script>
</body>
</html>
