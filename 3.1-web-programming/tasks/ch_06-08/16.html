<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>214823_박종현</title>
</head>
<body>
  <h3>어느 그룹에 속해 있나요?</h3>
  <hr>
  <!--
    자바스크립트를 사용하지 않고 innerHTML과 this를 사용하여 실행 예시와 같이 출력하라.
    확인하기: 
      1. .innerHTML은 js DOM object 속성임
      2. this는 js 문법 스펙임
      3. onclick은 js DOM event 속성임
      => HTML 태그의 onclick 속성은 js 코드이고, 그 외의 방법으로 innerHTML과 this를 사용하는 방법을 찾지 못함
         innerHTML과 this를 제외한 자바스크립트 코드를 사용하지 말라는 것인지
         혹은 그 외의 방법이 있는지 확인 필요
  -->
  <p onclick="this.innerHTML = '카리나 에스파'">카리나 답</p>
  <p onclick="this.innerHTML = '정국 BTS'">정국 답</p>
</body>
</html>
